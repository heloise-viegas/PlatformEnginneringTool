apiVersion: apps/v1
kind: Deployment
metadata:
  name: reference-service
  namespace: reference-service
  labels:
    app: reference-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reference-service
  template:
    metadata:
      labels:
        app: reference-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: reference-service
          # Using :latest for now to get Week 1 working end-to-end. Swap to an
          # immutable tag (e.g. a git SHA) once Week 3's CI pipeline exists -
          # Week 4's policy engine will reject `:latest` outright.
          image: 060795923562.dkr.ecr.ap-south-1.amazonaws.com/reference-ecr:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: reference-service
            - name: SERVICE_VERSION
              value: "0.1.0"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
