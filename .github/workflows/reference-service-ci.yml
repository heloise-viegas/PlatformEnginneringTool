name: reference-service CI/CD

# Builds and pushes the reference-service image on every change to its source,
# then updates the GitOps manifest with the new tag so Argo CD auto-syncs it.
# No manual `kubectl apply` step anywhere in this flow.
#
# This is now a thin caller of service-ci-reusable.yml - the actual
# build/push/bump steps live there so every scaffolded service shares the
# same pipeline instead of a copy-pasted workflow file per service.
on:
  push:
    branches: [main]
    paths:
      - "services/reference-service/**"
      - ".github/workflows/reference-service-ci.yml"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    # A called reusable workflow can never have more permissions than the
    # calling job grants it, regardless of what the reusable workflow itself
    # declares - so this needs to explicitly grant what
    # service-ci-reusable.yml asks for (contents: write, to push the bumped
    # image tag back to the values.yaml).
    permissions:
      contents: write
    uses: ./.github/workflows/service-ci-reusable.yml
    with:
      service_name: reference-service
      service_path: services/reference-service
      # Irregular on purpose: this repo predates the ecr terraform module and
      # service_names convention (name == repo name) - left as-is rather than
      # renaming a live repository.
      ecr_repository: reference-ecr
      values_path: charts/reference-service/values.yaml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
