name: reference-service CI/CD

# Builds and pushes the reference-service image on every change to its source,
# then updates the GitOps manifest with the new tag so Argo CD auto-syncs it.
# No manual `kubectl apply` step anywhere in this flow.
on:
  push:
    branches: [main]
    paths:
      - "services/reference-service/**"
      - ".github/workflows/reference-service-ci.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 060795923562.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: reference-ecr
  # The Helm chart's values.yaml - Argo CD's Application now sources from
  # charts/reference-service directly, so this is the file that controls
  # what actually gets deployed.
  VALUES_PATH: charts/reference-service/values.yaml

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (short git SHA - never :latest)
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/reference-service
          # Must match the EKS node architecture (x86_64 t3.medium nodes) -
          # building on an Apple Silicon laptop without this flag produces an
          # arm64 image that fails to pull with "no match for platform".
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in Helm values
        run: |
          yq -i '.image.tag = "${{ steps.vars.outputs.tag }}"' "${{ env.VALUES_PATH }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.VALUES_PATH }}"
          if git diff --cached --quiet; then
            echo "No values change to commit."
          else
            git commit -m "ci: deploy reference-service ${{ steps.vars.outputs.tag }}"
            git push
          fi
